<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">midi-ble-rt GUI reference model</title>
  <desc id="desc">Reference mockup for the musician-facing midi-ble-rt GTK/libadwaita GUI: a single GNOME header bar, daemon status, BLE-MIDI scan action, device cards, ALSA port status and latency indicators.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1280" height="760" rx="0" fill="#f4f4f4"/>

  <g filter="url(#shadow)">
    <rect x="140" y="70" width="1000" height="620" rx="18" fill="#ffffff"/>
    <rect x="140" y="70" width="1000" height="72" rx="18" fill="#fafafa"/>
    <rect x="140" y="124" width="1000" height="18" fill="#fafafa"/>
    <line x1="140" y1="142" x2="1140" y2="142" stroke="#deddda"/>
  </g>

  <circle cx="171" cy="106" r="7" fill="#ed333b"/>
  <circle cx="195" cy="106" r="7" fill="#f6d32d"/>
  <circle cx="219" cy="106" r="7" fill="#57e389"/>

  <text x="640" y="113" font-family="Inter, Cantarell, sans-serif" font-size="22" text-anchor="middle" fill="#241f31" font-weight="700">midi-ble-rt</text>

  <rect x="955" y="88" width="84" height="36" rx="18" fill="#e9e9e7"/>
  <circle cx="1020" cy="106" r="14" fill="#3584e4"/>
  <text x="875" y="112" font-family="Inter, Cantarell, sans-serif" font-size="15" fill="#3d3846">Daemon</text>
  <text x="1057" y="112" font-family="Inter, Cantarell, sans-serif" font-size="15" fill="#3584e4" font-weight="700">Running</text>

  <rect x="182" y="174" width="338" height="470" rx="16" fill="#f7f7f7" stroke="#deddda"/>
  <text x="214" y="215" font-family="Inter, Cantarell, sans-serif" font-size="24" fill="#241f31" font-weight="700">BLE-MIDI devices</text>
  <text x="214" y="243" font-family="Inter, Cantarell, sans-serif" font-size="14" fill="#5e5c64">Scan, select and bind a controller.</text>

  <rect x="214" y="270" width="274" height="48" rx="12" fill="#3584e4"/>
  <text x="351" y="300" font-family="Inter, Cantarell, sans-serif" font-size="17" text-anchor="middle" fill="#ffffff" font-weight="700">Scan BLE-MIDI</text>

  <rect x="214" y="346" width="274" height="96" rx="14" fill="#ffffff" stroke="#c0bfbc"/>
  <circle cx="245" cy="380" r="12" fill="#33d17a"/>
  <text x="272" y="376" font-family="Inter, Cantarell, sans-serif" font-size="17" fill="#241f31" font-weight="700">Roland GO:KEYS</text>
  <text x="272" y="403" font-family="Inter, Cantarell, sans-serif" font-size="14" fill="#5e5c64">Connected · Streaming</text>
  <text x="272" y="425" font-family="Inter, Cantarell, sans-serif" font-size="13" fill="#77767b">BLE-MIDI service validated</text>

  <rect x="214" y="462" width="274" height="84" rx="14" fill="#ffffff" stroke="#deddda"/>
  <circle cx="245" cy="494" r="12" fill="#9a9996"/>
  <text x="272" y="491" font-family="Inter, Cantarell, sans-serif" font-size="17" fill="#241f31" font-weight="700">Standard BLE-MIDI</text>
  <text x="272" y="518" font-family="Inter, Cantarell, sans-serif" font-size="14" fill="#5e5c64">Available · Not bound</text>

  <rect x="560" y="174" width="538" height="470" rx="16" fill="#ffffff" stroke="#deddda"/>
  <text x="594" y="215" font-family="Inter, Cantarell, sans-serif" font-size="24" fill="#241f31" font-weight="700">Session</text>
  <text x="594" y="243" font-family="Inter, Cantarell, sans-serif" font-size="14" fill="#5e5c64">Musician-facing bridge state.</text>

  <rect x="594" y="276" width="470" height="82" rx="14" fill="#f6f5f4"/>
  <text x="620" y="307" font-family="Inter, Cantarell, sans-serif" font-size="15" fill="#5e5c64">ALSA port</text>
  <text x="620" y="334" font-family="Inter, Cantarell, sans-serif" font-size="20" fill="#241f31" font-weight="700">midi-ble-rt: Roland GO:KEYS</text>
  <rect x="942" y="299" width="94" height="32" rx="16" fill="#33d17a"/>
  <text x="989" y="320" font-family="Inter, Cantarell, sans-serif" font-size="14" text-anchor="middle" fill="#ffffff" font-weight="700">Active</text>

  <rect x="594" y="384" width="222" height="112" rx="14" fill="#f6f5f4"/>
  <text x="620" y="419" font-family="Inter, Cantarell, sans-serif" font-size="15" fill="#5e5c64">RX path</text>
  <text x="620" y="454" font-family="Inter, Cantarell, sans-serif" font-size="28" fill="#241f31" font-weight="700">BLE → ALSA</text>
  <text x="620" y="478" font-family="Inter, Cantarell, sans-serif" font-size="14" fill="#5e5c64">Realtime policy selectable</text>

  <rect x="842" y="384" width="222" height="112" rx="14" fill="#f6f5f4"/>
  <text x="868" y="419" font-family="Inter, Cantarell, sans-serif" font-size="15" fill="#5e5c64">TX path</text>
  <text x="868" y="454" font-family="Inter, Cantarell, sans-serif" font-size="28" fill="#241f31" font-weight="700">ALSA → BLE</text>
  <text x="868" y="478" font-family="Inter, Cantarell, sans-serif" font-size="14" fill="#5e5c64">Conservative by default</text>

  <rect x="594" y="522" width="470" height="80" rx="14" fill="#f6f5f4"/>
  <text x="620" y="553" font-family="Inter, Cantarell, sans-serif" font-size="15" fill="#5e5c64">Target controls</text>
  <text x="620" y="581" font-family="Inter, Cantarell, sans-serif" font-size="17" fill="#241f31">Connect MIDI first · Audio/A2DP remains outside the MIDI path</text>

  <text x="640" y="722" font-family="Inter, Cantarell, sans-serif" font-size="13" text-anchor="middle" fill="#77767b">Reference model for the in-development GUI; CLI and daemon remain the validated core path.</text>
</svg>
