name: Apply GUI runtime gate

on:
  push:
    branches:
      - fix/gui-runtime-gate

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/gui-runtime-gate

      - name: Apply focused source edit
        shell: python
        run: |
          from pathlib import Path
          import re

          path = Path('gui/gnome/mb-gnome-window.c')
          text = path.read_text(encoding='utf-8')
          original = text

          def replace_once(old: str, new: str, label: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected exactly one match, found {count}')
              text = text.replace(old, new, 1)

          replace_once(
              'static bool bluez_can_scan_for_gui(const MbGnomeWindowState *state) {',
              'static bool gui_runtime_available(const MbGnomeWindowState *state) {',
              'rename availability helper',
          )
          text = text.replace('bluez_can_scan_for_gui(state)',
                              'gui_runtime_available(state)')

          replace_once(
              '''    if (state->sidebar_list)\n        gtk_widget_set_sensitive(state->sidebar_list, TRUE);''',
              '''    if (state->sidebar_list)\n        gtk_widget_set_sensitive(state->sidebar_list,\n                                 gui_runtime_available(state));''',
              'sidebar runtime gate',
          )

          replace_once(
              '''    bool sensitive =\n        gui_runtime_available(state) &&\n        !state->scan_in_flight &&\n        !state->command_in_flight;''',
              '''    bool sensitive = gui_runtime_available(state);''',
              'scan button gate',
          )

          replace_once(
              '''    gtk_widget_set_sensitive(state->scan_button, sensitive);''',
              '''    gtk_widget_set_sensitive(state->scan_button, sensitive);\n\n    /*\n     * One availability gate for the musician-facing main window.\n     * Operation serialization belongs to the daemon; local busy flags must\n     * not make the main controls look unavailable.\n     */\n    if (state->sidebar_list)\n        gtk_widget_set_sensitive(state->sidebar_list, sensitive);\n\n    if (state->connect_button) {\n        const MbUiDevice *device = selected_device(state);\n        gtk_widget_set_sensitive(state->connect_button,\n                                 sensitive && device != NULL);\n    }''',
              'propagate runtime gate to main controls',
          )

          replace_once(
              '''        gtk_widget_set_sensitive(state->connect_button,\n                                 state->daemon_functional &&\n                                 has_selection &&\n                                 !busy);''',
              '''        gtk_widget_set_sensitive(state->connect_button,\n                                 gui_runtime_available(state) &&\n                                 has_selection);''',
              'connect button gate',
          )

          replace_once(
              '''    if (!state->daemon_functional) {\n        show_error_dialog(state,\n                          "Serviço MIDI-BLE inativo",\n                          "Inicie o serviço MIDI-BLE antes de buscar instrumentos.");\n        return;\n    }''',
              '''    if (!state->daemon_dbus_ready) {\n        show_error_dialog(state,\n                          "Serviço MIDI-BLE inativo",\n                          "Inicie o serviço MIDI-BLE antes de buscar instrumentos.");\n        return;\n    }''',
              'scan callback daemon gate',
          )

          replace_once(
              '''\n    if (state->scan_in_flight)\n        return;\n\n    show_scan_pair_dialog(state);''',
              '''\n    show_scan_pair_dialog(state);''',
              'remove main-window scan busy gate',
          )

          if 'bluez_can_scan_for_gui' in text:
              raise SystemExit('old availability helper name remains')
          if text == original:
              raise SystemExit('no source changes were produced')

          path.write_text(text, encoding='utf-8')

      - name: Remove one-shot workflow
        run: rm -f .github/workflows/apply-gui-runtime-gate.yml

      - name: Commit focused change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gui/gnome/mb-gnome-window.c .github/workflows/apply-gui-runtime-gate.yml
          git commit -m "gui: use daemon and Bluetooth as sole availability gate"
          git push origin HEAD:fix/gui-runtime-gate
