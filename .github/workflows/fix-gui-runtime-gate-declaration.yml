name: Finalize GUI runtime gate declaration

on:
  push:
    branches:
      - fix/gui-runtime-gate

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/gui-runtime-gate

      - name: Add declaration and align documentation
        shell: python
        run: |
          from pathlib import Path

          path = Path('gui/gnome/mb-gnome-window.c')
          text = path.read_text(encoding='utf-8')

          old = '''static void forget_clicked_cb(GtkButton *button, gpointer user_data);\nstatic void daemon_root_observer_apply(MbGnomeWindowState *state);'''
          new = '''static void forget_clicked_cb(GtkButton *button, gpointer user_data);\nstatic bool gui_runtime_available(const MbGnomeWindowState *state);\nstatic void daemon_root_observer_apply(MbGnomeWindowState *state);'''
          if text.count(old) != 1:
              raise SystemExit(f'forward declaration anchor count={text.count(old)}')
          text = text.replace(old, new, 1)

          old_comment = '''     * - Main list availability comes from the persisted catalog.\n     * - Basic panel and local actions come from list selection.\n     * - Runtime connect/disconnect additionally requires daemon_functional.'''
          new_comment = '''     * - Main list and runtime actions share gui_runtime_available().\n     * - Connect/Disconnect additionally requires a selected instrument.\n     * - Daemon-side serialization handles concurrent mutable operations.'''
          if text.count(old_comment) != 1:
              raise SystemExit(f'action comment anchor count={text.count(old_comment)}')
          text = text.replace(old_comment, new_comment, 1)

          path.write_text(text, encoding='utf-8')

      - name: Remove one-shot workflow
        run: rm -f .github/workflows/fix-gui-runtime-gate-declaration.yml

      - name: Commit final adjustment
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gui/gnome/mb-gnome-window.c .github/workflows/fix-gui-runtime-gate-declaration.yml
          git commit -m "gui: finalize shared runtime availability gate"
          git push origin HEAD:fix/gui-runtime-gate
