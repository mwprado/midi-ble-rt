name: CI

on:
  push:
    branches:
      - master
      - remove-legacy-core
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            libglib2.0-dev \
            libasound2-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Install
        run: cmake --install build --prefix "$PWD/install-root"

      - name: Check install tree
        run: |
          test -x install-root/bin/midi-ble-rtd
          test -x install-root/bin/midi-ble-rtctl
          find install-root -path '*/systemd/user/midi-ble-rtd.service' -print -quit | grep .
          test -d install-root/share/midi-ble-rt/config
